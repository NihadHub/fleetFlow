services:
  db:
    image: mysql:8.0
    container_name: fleetflow-db
    restart: always
    environment:
      MYSQL_DATABASE: FleetFlow
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fleetflow-app
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
    links:
      - db
